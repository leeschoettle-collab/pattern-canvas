<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative Pattern Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    #ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 10px 20px;
      user-select: none;
    }

    #ui button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff;
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #ui button:hover { background: rgba(255,255,255,0.2); }

    #ui label {
      font-size: 12px;
      opacity: 0.6;
      white-space: nowrap;
    }

    #palette-row {
      display: flex;
      gap: 6px;
    }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
    }
    .swatch:hover { transform: scale(1.25); }
    .swatch.active { border-color: #fff; }

    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
    #hint h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    #hint p {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.4;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hint">
  <h1>Generative Pattern Canvas</h1>
  <p>Click or drag to paint patterns &nbsp;·&nbsp; Hold Shift for burst mode</p>
</div>

<div id="ui">
  <label>Palette</label>
  <div id="palette-row"></div>
  <button id="btn-clear">Clear</button>
  <button id="btn-save">Save PNG</button>
</div>

<script>
// ─── Canvas setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── Palettes ────────────────────────────────────────────────────────────────
const PALETTES = [
  { name: 'Aurora',  colors: ['#00f5d4','#00bbf9','#f15bb5','#9b5de5','#fee440'] },
  { name: 'Ember',   colors: ['#ff0a54','#ff477e','#ff85a1','#fbb1bd','#f9bec7'] },
  { name: 'Forest',  colors: ['#52b788','#74c69d','#95d5b2','#b7e4c7','#40916c'] },
  { name: 'Cosmic',  colors: ['#7b2d8b','#9d4edd','#c77dff','#e0aaff','#10002b'] },
];

let currentPalette = PALETTES[0];

// ─── Pattern system ──────────────────────────────────────────────────────────
const patterns = [];

class Pattern {
  constructor(x, y, palette) {
    this.x = x;
    this.y = y;
    this.palette = palette;
    this.rings = [];
    this.age = 0;
    this.maxAge = 180 + Math.random() * 240;
    this.speed = 0.6 + Math.random() * 1.2;
    this.type = Math.floor(Math.random() * 4); // 0=circles, 1=stars, 2=hex, 3=petals
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.015;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.maxRadius = 60 + Math.random() * 120;
    this.ringCount = 0;
    this.ringGap = 14 + Math.random() * 10;
    this.alive = true;
    this.color = palette.colors[Math.floor(Math.random() * palette.colors.length)];
  }

  update() {
    this.age++;
    this.rotation += this.rotSpeed;
    this.pulsePhase += 0.04;

    // spawn new rings
    const expectedRings = Math.floor((this.age * this.speed) / this.ringGap);
    while (this.ringCount < expectedRings && this.ringCount * this.ringGap < this.maxRadius) {
      this.rings.push({ r: this.ringCount * this.ringGap, born: this.age });
      this.ringCount++;
    }

    if (this.age > this.maxAge) this.alive = false;
  }

  draw(ctx) {
    const life = Math.min(this.age / this.maxAge, 1);
    const fade = life < 0.15 ? life / 0.15 : life > 0.75 ? 1 - (life - 0.75) / 0.25 : 1;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    const pulse = 1 + Math.sin(this.pulsePhase) * 0.04;

    for (let i = 0; i < this.rings.length; i++) {
      const ring = this.rings[i];
      const ringLife = Math.min((this.age - ring.born) / 20, 1);
      const alpha = fade * ringLife * (0.3 + 0.4 * (1 - i / this.rings.length));
      const r = ring.r * pulse;

      ctx.globalAlpha = alpha;
      const colorIndex = i % this.palette.colors.length;
      ctx.strokeStyle = this.palette.colors[colorIndex];
      ctx.fillStyle = this.palette.colors[colorIndex];
      ctx.lineWidth = 1.5;

      switch (this.type) {
        case 0: this.drawCircleRing(ctx, r); break;
        case 1: this.drawStarRing(ctx, r, i); break;
        case 2: this.drawHexRing(ctx, r, i); break;
        case 3: this.drawPetalRing(ctx, r, i); break;
      }
    }

    ctx.restore();
    ctx.globalAlpha = 1;
  }

  drawCircleRing(ctx, r) {
    const count = 6 + Math.floor(r / 10);
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const cx = Math.cos(angle) * r;
      const cy = Math.sin(angle) * r;
      const dotR = 3 + (r / 60);
      ctx.beginPath();
      ctx.arc(cx, cy, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  drawStarRing(ctx, r, idx) {
    const points = 5 + (idx % 3);
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
      const rr = i % 2 === 0 ? r : r * 0.5;
      const x = Math.cos(angle) * rr;
      const y = Math.sin(angle) * rr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  drawHexRing(ctx, r, idx) {
    const sides = 6;
    ctx.beginPath();
    for (let i = 0; i <= sides; i++) {
      const angle = (i / sides) * Math.PI * 2 - Math.PI / 6;
      const x = Math.cos(angle) * r;
      const y = Math.sin(angle) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();

    if (idx % 2 === 0) {
      for (let i = 0; i < sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 6;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        ctx.stroke();
      }
    }
  }

  drawPetalRing(ctx, r, idx) {
    const petals = 6 + (idx % 4) * 2;
    for (let i = 0; i < petals; i++) {
      const angle = (i / petals) * Math.PI * 2;
      const bx = Math.cos(angle) * r;
      const by = Math.sin(angle) * r;
      const cp1x = Math.cos(angle - 0.4) * r * 0.6;
      const cp1y = Math.sin(angle - 0.4) * r * 0.6;
      const cp2x = Math.cos(angle + 0.4) * r * 0.6;
      const cp2y = Math.sin(angle + 0.4) * r * 0.6;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, bx, by);
      ctx.stroke();
    }
  }
}

// ─── Render loop ─────────────────────────────────────────────────────────────
function render() {
  ctx.fillStyle = 'rgba(10,10,15,0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = patterns.length - 1; i >= 0; i--) {
    patterns[i].update();
    patterns[i].draw(ctx);
    if (!patterns[i].alive) patterns.splice(i, 1);
  }

  requestAnimationFrame(render);
}
render();

// ─── Input ───────────────────────────────────────────────────────────────────
let isPointerDown = false;
let spawnThrottle = 0;
let interacted = false;

function spawnAt(x, y, burst = false) {
  if (!interacted) {
    document.getElementById('hint').style.opacity = '0';
    interacted = true;
  }
  const count = burst ? 4 + Math.floor(Math.random() * 4) : 1;
  for (let i = 0; i < count; i++) {
    const jx = burst ? x + (Math.random() - 0.5) * 80 : x;
    const jy = burst ? y + (Math.random() - 0.5) * 80 : y;
    patterns.push(new Pattern(jx, jy, currentPalette));
  }
}

canvas.addEventListener('pointerdown', e => {
  isPointerDown = true;
  spawnAt(e.clientX, e.clientY, e.shiftKey);
});

canvas.addEventListener('pointermove', e => {
  if (!isPointerDown) return;
  spawnThrottle++;
  if (spawnThrottle % 4 !== 0) return;
  spawnAt(e.clientX, e.clientY, e.shiftKey);
});

canvas.addEventListener('pointerup', () => { isPointerDown = false; });
canvas.addEventListener('pointerleave', () => { isPointerDown = false; });

// ─── UI ───────────────────────────────────────────────────────────────────────
const paletteRow = document.getElementById('palette-row');

PALETTES.forEach((palette, pi) => {
  const swatch = document.createElement('div');
  swatch.className = 'swatch' + (pi === 0 ? ' active' : '');
  swatch.title = palette.name;
  // gradient from first to last color
  swatch.style.background = `linear-gradient(135deg, ${palette.colors[0]}, ${palette.colors[2]})`;
  swatch.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    swatch.classList.add('active');
    currentPalette = palette;
  });
  paletteRow.appendChild(swatch);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  patterns.length = 0;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

document.getElementById('btn-save').addEventListener('click', () => {
  // Composite onto solid background for the saved image
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  const tctx = tmp.getContext('2d');
  tctx.fillStyle = '#0a0a0f';
  tctx.fillRect(0, 0, tmp.width, tmp.height);
  tctx.drawImage(canvas, 0, 0);

  const a = document.createElement('a');
  a.href = tmp.toDataURL('image/png');
  a.download = `pattern-${Date.now()}.png`;
  a.click();
});
</script>
</body>
</html>
